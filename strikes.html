.mst:hover{border-color:var(--hk);}
.mst.open .arr{transform:rotate(180deg);}

.mst-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.msd{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--w);border:1px solid var(--hk-b);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.08);z-index:100;max-height:240px;overflow-y:auto;}

const map={};
raw.forEach(r=>{
  const k=r[1]+'||'+r[2];
  if(!map[k]) map[k]={dist:r[1],loja:r[2],tipo:r[3],okStrikes:[],cancelStrikes:[]};
  if(r[5]) map[k].cancelStrikes.push(r[4]);
  else map[k].okStrikes.push(r[4]);
});
const stores=Object.values(map).map(s=>{
  const maxOk=s.okStrikes.length?Math.max(...s.okStrikes):0;
  const maxCancel=s.cancelStrikes.length?Math.max(...s.cancelStrikes):0;
  const hasCancelled=s.cancelStrikes.length>0;
  return{dist:s.dist,loja:s.loja,tipo:s.tipo,effectiveS:maxOk,maxCancel,hasCancelled,isOnlyCancelled:maxOk===0&&hasCancelled};
}).sort((a,b)=>b.effectiveS-a.effectiveS||a.loja.localeCompare(b.loja));

const allD=[...new Set(stores.map(s=>s.dist))].sort();
let selD=new Set(),ddOpen=false,activeTab='all';

function buildDD(){
  document.getElementById('msd').innerHTML=
    `<div class="mso ms-all ${selD.size===0?'sel':''}" onclick="toggleAll()"><span class="mck"></span>Todos os distribuidores</div><hr class="ms-div">`
    +allD.map(d=>`<div class="mso ${selD.has(d)?'sel':''}" onclick="toggleD('${d.replace(/'/g,"\\'")}')"><span class="mck"></span>${d}</div>`).join('');
}
function toggleDD(){ddOpen=!ddOpen;document.getElementById('mst').classList.toggle('open',ddOpen);document.getElementById('msd').classList.toggle('open',ddOpen);}
function toggleAll(){selD.clear();buildDD();updateLbl();render();}
function toggleD(d){selD.has(d)?selD.delete(d):selD.add(d);buildDD();updateLbl();render();}
function updateLbl(){document.getElementById('msl').textContent=selD.size===0?'Todos':selD.size===1?[...selD][0]:selD.size+' selecionados';}
function setTab(t){activeTab=t;['all','active','cancel'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===t));render();}
document.addEventListener('click',e=>{if(!document.querySelector('.msw').contains(e.target)&&ddOpen){ddOpen=false;document.getElementById('mst').classList.remove('open');document.getElementById('msd').classList.remove('open');}});

function getF(){
  const q=document.getElementById('srch').value.toLowerCase();
  return stores.filter(s=>{
    const dOk=selD.size===0||selD.has(s.dist);
    const qOk=!q||s.loja.toLowerCase().includes(q)||s.dist.toLowerCase().includes(q);
    const tOk=activeTab==='all'||(activeTab==='active'&&!s.isOnlyCancelled)||(activeTab==='cancel'&&s.hasCancelled);
    return dOk&&qOk&&tOk;
  });
}
function sbC(n){return n>=3?'sb3':n===2?'sb2':n>=1?'sb1':'sb0';}
function sbL(n){return n>=1?'Strike '+n:'Sem strike';}

function render(){
  const f=getF();
  const active=f.filter(s=>!s.isOnlyCancelled);
  document.getElementById('metrics').innerHTML=`
    <div class="mc"><div class="ml">Lojas ativas</div><div class="mv t">${active.length}</div></div>
    <div class="mc"><div class="ml">Strike 1</div><div class="mv s1">${active.filter(s=>s.effectiveS===1).length}</div></div>
    <div class="mc"><div class="ml">Strike 2</div><div class="mv s2">${active.filter(s=>s.effectiveS===2).length}</div></div>
    <div class="mc"><div class="ml">Strike 3+</div><div class="mv s3">${active.filter(s=>s.effectiveS>=3).length}</div></div>
    <div class="mc"><div class="ml">C/ cancelamento</div><div class="mv sc">${f.filter(s=>s.hasCancelled).length}</div></div>`;

  document.getElementById('cbadge').textContent=f.length+' lojas';
  document.getElementById('slist').innerHTML=!f.length?'<div class="empty">Nenhuma loja encontrada</div>'
    :`<table class="tbl"><thead><tr><th>Loja</th><th>Distribuidor</th><th>Tipo</th><th>Strike</th></tr></thead><tbody>
    ${f.map(s=>{
      const tc=s.tipo==='puro'?'tp-p':s.tipo==='híbrido'?'tp-h':'tp-o';
      return `<tr><td class="ln">${s.loja}</td><td class="dn">${s.dist}</td><td><span class="tp ${tc}">${s.tipo}</span></td><td><span class="sb ${sbC(s.effectiveS)}">${sbL(s.effectiveS)}</span></td></tr>`;
    }).join('')}</tbody></table>`;

  const visibleDists=[...new Set(f.map(s=>s.dist))].sort();
  const W=150,mx=Math.max(...visibleDists.map(d=>{
    const ds=f.filter(s=>s.dist===d);
    return ds.filter(s=>s.effectiveS===1&&!s.hasCancelled).length+ds.filter(s=>s.effectiveS===2&&!s.hasCancelled).length+ds.filter(s=>s.effectiveS>=3&&!s.hasCancelled).length+ds.filter(s=>s.hasCancelled).length;
  }),1);
  document.getElementById('bchart').innerHTML=visibleDists.map(d=>{
    const ds=f.filter(s=>s.dist===d);
    const n1=ds.filter(s=>s.effectiveS===1&&!s.hasCancelled).length;
    const n2=ds.filter(s=>s.effectiveS===2&&!s.hasCancelled).length;
    const n3=ds.filter(s=>s.effectiveS>=3&&!s.hasCancelled).length;
    const nc=ds.filter(s=>s.hasCancelled).length;
    return `<div class="bi"><div class="bd">${d}</div><div class="br">
      ${n1?`<div class="bs bs1" style="width:${Math.round(n1/mx*W)}px" title="Strike 1: ${n1}"></div>`:''}
      ${n2?`<div class="bs bs2" style="width:${Math.round(n2/mx*W)}px" title="Strike 2: ${n2}"></div>`:''}
      ${n3?`<div class="bs bs3" style="width:${Math.round(n3/mx*W)}px" title="Strike 3+: ${n3}"></div>`:''}
      ${nc?`<div class="bs bsc" style="width:${Math.round(nc/mx*W)}px" title="C/ cancelamento: ${nc}"></div>`:''}
      <span class="bt">${n1+n2+n3+nc}</span></div></div>`;
  }).join('');
}
buildDD();render();
</script>
